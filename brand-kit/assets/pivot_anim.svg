<svg width="760" height="180" viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0722E"/>
      <stop offset="1" stop-color="#CE451B"/>
    </linearGradient>
  </defs>
  <rect width="760" height="180" fill="#080808"/>

  <g transform="translate(40,63)">
    <!-- arc trail: fades in as the shape travels, fades out on settle -->
    <path d="M64 42 Q88 -8 128 30" fill="none" stroke="#F0722E" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="120" stroke-dashoffset="120" opacity="0">
      <animate attributeName="stroke-dashoffset" values="120;120;0;0;120"
               keyTimes="0;0.15;0.55;0.8;1" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.5;0.5;0"
               keyTimes="0;0.15;0.55;0.8;1" dur="3.2s" repeatCount="indefinite"/>
    </path>

    <!-- the leaping shape: departs origin, arcs up, lands + rotates into diamond -->
    <g>
      <!-- translate along the leap (lift, arc over, settle) -->
      <animateTransform attributeName="transform" type="translate" additive="sum"
        values="0,0; 0,0; 40,-34; 104,0; 104,0; 104,0; 0,0"
        keyTimes="0;0.18;0.4;0.56;0.85;0.92;1" dur="3.2s"
        calcMode="spline"
        keySplines="0.4 0 0.2 1; 0.5 0 0.2 1; 0.34 1.3 0.4 1; 0.2 0 0 1; 0 0 1 1; 0.5 0 0.5 1"
        repeatCount="indefinite"/>
      <g transform="translate(28,52)">
        <!-- rotate 0deg -> 45deg during the arc, hold, then reset -->
        <animateTransform attributeName="transform" type="rotate" additive="sum"
          values="0; 0; 20; 45; 45; 45; 0"
          keyTimes="0;0.18;0.4;0.56;0.85;0.92;1" dur="3.2s"
          calcMode="spline"
          keySplines="0.4 0 0.2 1; 0.5 0 0.2 1; 0.34 1.2 0.4 1; 0.2 0 0 1; 0 0 1 1; 0.5 0 0.5 1"
          repeatCount="indefinite"/>
        <rect x="-28" y="-28" width="56" height="56" rx="9" fill="url(#ember)"/>
      </g>
    </g>
    <!-- origin square (bone) — drawn last so the leap emerges from behind it -->
    <rect x="0" y="24" width="56" height="56" rx="9" fill="#DEDBD4"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(216,138)" font-family="'DM Sans',Arial,sans-serif" font-size="66" font-weight="600" letter-spacing="-2">
    <text x="0" y="0" fill="#DEDBD4">Middle<tspan dx="2" fill="#E65C2D">Leap</tspan></text>
  </g>
</svg>
